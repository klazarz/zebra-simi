<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Property Graph Explorer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/styles/vis-network.min.css" rel="stylesheet">
  <style>
    body {
      background: #f8fafc;
    }

    .graph-shell {
      max-width: 1200px;
      margin: 2rem auto;
    }

    #mynetwork {
      height: 78vh;
      min-height: 640px;
      border: 1px solid #dbe2ea;
      border-radius: 1rem;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
    }

    .legend-dot {
      width: 0.8rem;
      height: 0.8rem;
      border-radius: 999px;
      display: inline-block;
      margin-right: 0.4rem;
    }
  </style>
</head>

<body>
  <div class="graph-shell px-3">
    <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-3">
      <div>
        <h1 class="h3 mb-2">Property Graph Explorer</h1>
        <p class="text-muted mb-2">
          Live visualization of the <code>countries_graph</code> property graph stored in <code>ORAAIDB</code>.
        </p>
        <p class="small text-muted mb-0">
          Germany is highlighted in dark red. Direct neighbors are orange. Drag nodes, zoom, and click a country to inspect its neighborhood.
        </p>
      </div>
      <div class="small text-muted">
        <div><span class="legend-dot" style="background:#8B2500;"></span>Germany</div>
        <div><span class="legend-dot" style="background:#d97706;"></span>Direct neighbor</div>
        <div><span class="legend-dot" style="background:#97c2fc;"></span>Other country</div>
      </div>
    </div>

    <div id="mynetwork"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/dist/vis-network.min.js"></script>
  <script>
    const container = document.getElementById("mynetwork");
    const nodes = new vis.DataSet({{ graph_nodes | safe }});
    const edges = new vis.DataSet({{ graph_edges | safe }});

    const options = {
      autoResize: true,
      nodes: {
        shape: "dot",
        size: 20,
        font: {
          size: 15,
          face: "Helvetica"
        },
        borderWidth: 2,
        shadow: true
      },
      edges: {
        arrows: {
          to: {
            enabled: false
          }
        },
        width: 2,
        color: {
          color: "#94a3b8",
          highlight: "#334155",
          hover: "#334155"
        },
        smooth: {
          enabled: true,
          type: "dynamic"
        }
      },
      interaction: {
        hover: true,
        navigationButtons: true,
        keyboard: true
      },
      physics: {
        enabled: true,
        solver: "forceAtlas2Based",
        forceAtlas2Based: {
          gravitationalConstant: -70,
          centralGravity: 0.01,
          springLength: 170,
          springConstant: 0.08,
          damping: 0.6
        },
        stabilization: {
          enabled: true,
          iterations: 500,
          updateInterval: 25
        }
      }
    };

    const network = new vis.Network(container, { nodes, edges }, options);
    network.once("stabilizationIterationsDone", () => network.fit({ animation: true }));
  </script>
</body>

</html>
